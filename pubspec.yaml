name: kutbi_paints
description: "Kutbi Paints - Wholesale Paint Management System"
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_dotenv: ^5.1.0
  
  # Supabase
  supabase_flutter: ^2.8.4
  
  google_sign_in: ^6.2.2
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  
  # Charts
  fl_chart: ^0.70.2
  
  # QR/Barcode Scanning
  mobile_scanner: ^6.0.2
  
  # Offline Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.3
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  fluttertoast: ^8.2.10
  package_info_plus: ^8.2.0
  http: ^1.2.0
  
  # Reporting & Files
  csv: ^6.0.0
  pdf: ^3.11.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  open_filex: ^4.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  window_manager: ^0.4.3
  qr_flutter: ^4.1.0
  printing: ^5.14.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default:21
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/animations/
    - .env
